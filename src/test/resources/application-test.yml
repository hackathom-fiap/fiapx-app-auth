spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6370
      password: 
  h2:
    console:
      enabled: true

server:
  port: 0

jwt:
  secret: test-secret-key-for-unit-tests
  expiration: 3600000
