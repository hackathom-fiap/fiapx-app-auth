apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-cluster-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secret
  namespace: hackathon-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-cluster-secretsmanager
    kind: ClusterSecretStore
  target:
    name: auth-secret # Nome do Secret do K8s criado pelo ESO
    creationPolicy: Owner
  data:
    # Senha do banco de dados RDS PostgreSQL
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "rds!db-051612da-a9be-4c36-a343-f9261a18f529-lrkPVU"
        property: password
    # Chave secreta do JWT (assinatura de tokens)
    - secretKey: JWT_SECRET
      remoteRef:
        key: "fiapx/jwt-secret"
        property: secret_key
    # Senha do Redis ElastiCache
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: "/fiapx-redis/redis/user_password-v4"
        property: password
