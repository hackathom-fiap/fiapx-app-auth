apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secret
  namespace: hackathon-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-cluster-secretsmanager
  target:
    name: auth-secret
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: rds!db-051612da-a9be-4c36-a343-f9261a18f529
      property: password
  - secretKey: JWT_SECRET
    remoteRef:
      key: fiapx/jwt-secret
      property: secret_key
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: /fiapx-redis/redis/user_password-v4
      property: password
