apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hackathon-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: fiap-x-auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: auth-config
        - secretRef:
            name: auth-secret
        resources:
          requests:
            cpu: "10m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
