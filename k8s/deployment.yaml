apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hackathon-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-account
      containers:
      - name: auth-service
        image: 239409137076.dkr.ecr.us-east-1.amazonaws.com/auth:TAG
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: auth-config
        - secretRef:
            name: auth-secret
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
